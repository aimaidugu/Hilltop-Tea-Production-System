<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Forbidden</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'tea-green':  '#1e3932',
              'tea-gold':   '#c9a96e',
              'tea-cream':  '#f5f2eb',
              'tea-danger': '#c0392b',
            },
            fontFamily: {
              display: ['"Cormorant Garamond"', 'Georgia', 'serif'],
              body:    ['"DM Sans"', 'system-ui', 'sans-serif'],
            },
          }
        }
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
</head>
<body class="bg-tea-cream min-h-screen flex items-center justify-center">
    <div class="text-center">
        <h1 class="text-9xl font-display font-bold text-tea-danger mb-4">403</h1>
        <h2 class="text-3xl font-display font-bold text-tea-green mb-4">Access Denied</h2>
        <p class="text-tea-muted mb-8 max-w-md mx-auto">
            You do not have permission to access this page. Please contact your administrator if you believe this is an error.
        </p>
        <a href="{{ url_for('main.index') }}" class="inline-block px-6 py-3 bg-tea-green text-white rounded-lg hover:bg-tea-mid transition-colors">
            Return to Dashboard
        </a>
    </div>
</body>
</html>
