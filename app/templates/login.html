<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hilltop Tea</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'tea-green':  '#1e3932',
              'tea-mid':    '#2d5a4b',
              'tea-gold':   '#c9a96e',
              'tea-cream':  '#f5f2eb',
              'tea-dark':   '#2c3e50',
              'tea-muted':  '#6c757d',
              'tea-danger': '#c0392b',
              'tea-good':   '#27ae60',
            },
            fontFamily: {
              display: ['"Cormorant Garamond"', 'Georgia', 'serif'],
              body:    ['"DM Sans"', 'system-ui', 'sans-serif'],
            },
          }
        }
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: linear-gradient(135deg, #1e3932 0%, #2d5a4b 100%);
            min-height: 100vh;
        }
        .login-card {
            background-color: white;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            padding: 3rem;
            max-width: 400px;
            width: 100%;
            border-top: 4px solid #c9a96e;
        }
        .login-title {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 2rem;
            font-weight: 700;
            color: #1e3932;
            text-align: center;
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #2c3e50;
        }
        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            transition: all 0.15s;
        }
        .form-control:focus {
            outline: none;
            border-color: #c9a96e;
            box-shadow: 0 0 0 3px rgba(201, 169, 110, 0.2);
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 0.5rem;
            border: none;
            cursor: pointer;
            transition: all 0.15s;
            width: 100%;
        }
        .btn-gold {
            background-color: #c9a96e;
            color: white;
        }
        .btn-gold:hover {
            background-color: #b8995e;
        }
        .flash-message {
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            border-left: 4px solid;
        }
        .flash-error {
            background-color: #f8d7da;
            color: #721c24;
            border-color: #c0392b;
        }
    </style>
</head>
<body>
    <div class="flex items-center justify-center min-h-screen p-8">
        <div class="login-card">
            <h1 class="login-title">HILLTOP TEA</h1>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash-message flash-{{ category }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('auth.login') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" name="username" class="form-control" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" class="form-control" required>
                </div>

                <div class="form-group">
                    <label class="flex items-center">
                        <input type="checkbox" name="remember_me" class="mr-2">
                        <span class="text-sm">Remember me</span>
                    </label>
                </div>

                <button type="submit" class="btn btn-gold">Sign In</button>
            </form>
        </div>
    </div>
</body>
</html>
