{% extends "base.html" %}

{% block title %}Change Password - Hilltop Tea{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="card">
        <div class="card-header">
            <h2 class="card-title">Change Password</h2>
        </div>

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="form-group">
                <label for="current_password" class="form-label">Current Password</label>
                <input type="password" id="current_password" name="current_password"
                       class="form-control" required>
            </div>

            <div class="form-group">
                <label for="new_password" class="form-label">New Password</label>
                <input type="password" id="new_password" name="new_password"
                       class="form-control" required minlength="8">
                <p class="form-text">Password must be at least 8 characters long.</p>
            </div>

            <div class="form-group">
                <label for="confirm_password" class="form-label">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password"
                       class="form-control" required>
            </div>

            <div class="flex space-x-4">
                <a href="{{ url_for('main.index') }}" class="btn btn-green-outline">Cancel</a>
                <button type="submit" class="btn btn-gold">Change Password</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
